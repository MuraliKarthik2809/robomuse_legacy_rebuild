#footprint: [[-0.22, -0.13], [-0.22, 0.13], [0.22, 0.13], [0.22, -0.13]]
footprint: [[-0.34, -0.24], [-0.34, 0.24], [0.34, 0.24], [0.34, -0.24]]
#robot_radius: 0.4

inflation_radius: 0.5 #0.5 #1.75
cost_scaling_factor: 1.0 #2.0 #2.58

map_type: costmap
observation_sources: scan
scan:
  sensor_frame: laser
  data_type: LaserScan
  topic: scan
  marking: true
  clearing: true

